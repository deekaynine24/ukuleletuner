<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ukulele Tuner</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#111827;
    color:white;
    text-align:center;
}

.container{
    max-width:700px;
    margin:auto;
    padding:30px 20px;
}

h1{ margin-bottom:10px; }

button{
    padding:12px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin:5px;
    font-size:16px;
}

#startBtn{
    background:#22c55e;
    color:white;
}

.note-buttons button{
    background:#374151;
    color:white;
}

#note{
    font-size:90px;
    font-weight:bold;
    margin-top:20px;
}

#status{
    font-size:32px;
    font-weight:bold;
    margin-top:15px;
    min-height:40px;
}

.in-tune{ color:#22c55e; }
.flat{ color:#f59e0b; }
.sharp{ color:#ef4444; }

.meter{
    width:100%;
    max-width:500px;
    height:24px;
    background:#374151;
    border-radius:20px;
    position:relative;
    margin:30px auto;
}

.center-line{
    position:absolute;
    left:50%;
    top:0;
    width:2px;
    height:100%;
    background:#22c55e;
}

.needle{
    position:absolute;
    top:-8px;
    width:4px;
    height:40px;
    background:#ef4444;
    left:50%;
    transform:translateX(-50%);
}

.note-buttons{
    margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>Ukulele Tuner</h1>

<button id="startBtn">Start Microphone</button>

<div id="note">--</div>
<div id="status">Waiting...</div>

<div class="meter">
    <div class="center-line"></div>
    <div id="needle" class="needle"></div>
</div>

<h2>Reference Notes</h2>

<div class="note-buttons">
    <button onclick="playTone(392)">G</button>
    <button onclick="playTone(261.63)">C</button>
    <button onclick="playTone(329.63)">E</button>
    <button onclick="playTone(440)">A</button>
</div>

</div>

<script>

const noteNames=[
"C","C#","D","D#","E","F",
"F#","G","G#","A","A#","B"
];

let audioContext;
let analyser;
let pitchHistory=[];
let toneContext;

// --------------------
// INIT BUTTON
// --------------------
document.getElementById("startBtn").onclick = startTuner;

async function startTuner(){

    try{

        audioContext = new (window.AudioContext || window.webkitAudioContext)();

        const stream = await navigator.mediaDevices.getUserMedia({audio:true});

        const source = audioContext.createMediaStreamSource(stream);

        analyser = audioContext.createAnalyser();
        analyser.fftSize = 8192;

        source.connect(analyser);

        detectPitch();

    }catch(err){
        alert("Microphone error:\n" + err.message);
        console.error(err);
    }
}

// --------------------
// TUNER LOOP
// --------------------
function detectPitch(){

    const buffer = new Float32Array(analyser.fftSize);
    analyser.getFloatTimeDomainData(buffer);

    const pitch = yinPitch(buffer, audioContext.sampleRate);

    if(pitch > 0){
        updateUI(pitch);
    }

    requestAnimationFrame(detectPitch);
}

// --------------------
// UI UPDATE
// --------------------
function updateUI(freq){

    pitchHistory.push(freq);
    if(pitchHistory.length > 15) pitchHistory.shift();

    const avg = pitchHistory.reduce((a,b)=>a+b,0)/pitchHistory.length;

    const note = 69 + 12 * Math.log2(avg/440);
    const rounded = Math.round(note);

    const name = noteNames[((rounded%12)+12)%12];

    const target = 440 * Math.pow(2,(rounded-69)/12);

    const cents = 1200 * Math.log2(avg/target);

    document.getElementById("note").textContent = name;

    const status = document.getElementById("status");

    if(Math.abs(cents) <= 3){
        status.textContent = "✓ IN TUNE";
        status.className = "in-tune";

        if(navigator.vibrate){
            navigator.vibrate(50);
        }

    }else if(cents < 0){
        status.textContent = "◀ TOO LOW";
        status.className = "flat";
    }else{
        status.textContent = "TOO HIGH ▶";
        status.className = "sharp";
    }

    const needle = document.getElementById("needle");

    let pos = 50 + cents * 0.5;
    pos = Math.max(5, Math.min(95, pos));

    const prev = parseFloat(needle.dataset.pos || 50);
    const smooth = prev + (pos - prev) * 0.15;

    needle.dataset.pos = smooth;
    needle.style.left = smooth + "%";
}

// --------------------
// FAST YIN
// --------------------
function yinPitch(buffer, sampleRate){

    const size = buffer.length;
    const diff = new Float32Array(size/2);

    for(let tau=1; tau<diff.length; tau++){

        let sum = 0;

        for(let i=0; i<diff.length; i++){
            const d = buffer[i] - buffer[i+tau];
            sum += d*d;
        }

        diff[tau] = sum;
    }

    let running = 0;

    for(let i=1; i<diff.length; i++){
        running += diff[i];
        diff[i] *= i / running;
    }

    for(let tau=2; tau<diff.length; tau++){
        if(diff[tau] < 0.15){
            return sampleRate / tau;
        }
    }

    return -1;
}

// --------------------
// UKULELE-LIKE PLUCK + FIXED AUDIO CONTEXT
// --------------------
function playTone(freq){

    if(!toneContext){
        toneContext = new (window.AudioContext || window.webkitAudioContext)();
    }

    toneContext.resume();

    const now = toneContext.currentTime;

    const osc1 = toneContext.createOscillator();
    const osc2 = toneContext.createOscillator();
    const gain = toneContext.createGain();

    osc1.type = "triangle";
    osc2.type = "sine";

    osc1.frequency.value = freq;
    osc2.frequency.value = freq * 2;

    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(0.35, now + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 1.3);

    osc1.connect(gain);
    osc2.connect(gain);
    gain.connect(toneContext.destination);

    osc1.start(now);
    osc2.start(now);

    osc1.stop(now + 1.3);
    osc2.stop(now + 1.3);
}

</script>

</body>
</html>
