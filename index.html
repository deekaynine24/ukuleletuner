<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ukulele Tuner</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#111827;
    color:white;
    text-align:center;
}

.container{
    max-width:700px;
    margin:auto;
    padding:30px 20px;
}

h1{
    margin-bottom:10px;
}

button{
    padding:12px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin:5px;
    font-size:16px;
}

#startBtn{
    background:#22c55e;
    color:white;
}

.note-buttons button{
    background:#374151;
    color:white;
}

#note{
    font-size:90px;
    font-weight:bold;
    margin-top:20px;
}

#status{
    font-size:32px;
    font-weight:bold;
    margin-top:15px;
    min-height:40px;
}

.in-tune{
    color:#22c55e;
}

.flat{
    color:#f59e0b;
}

.sharp{
    color:#ef4444;
}

.meter{
    width:100%;
    max-width:500px;
    height:24px;
    background:#374151;
    border-radius:20px;
    position:relative;
    margin:30px auto;
}

.center-line{
    position:absolute;
    left:50%;
    top:0;
    width:2px;
    height:100%;
    background:#22c55e;
}

.needle{
    position:absolute;
    top:-8px;
    width:4px;
    height:40px;
    background:#ef4444;
    left:50%;
    transform:translateX(-50%);
}

.note-buttons{
    margin-top:20px;
}
</style>
</head>
<body>

<div class="container">



<button id="startBtn">Start Microphone</button>

<div id="note">--</div>

<div id="status">
    Waiting for microphone...
</div>

<div class="meter">
    <div class="center-line"></div>
    <div id="needle" class="needle"></div>
</div>

<h2>Reference Notes</h2>

<div class="note-buttons">
    <button onclick="playTone(392)">G</button>
    <button onclick="playTone(261.63)">C</button>
    <button onclick="playTone(329.63)">E</button>
    <button onclick="playTone(440)">A</button>
</div>

</div>

<script>

```javascript
const noteNames=[
"C","C#","D","D#","E","F",
"F#","G","G#","A","A#","B"
];

let audioContext;
let analyser;
let pitchHistory=[];

document
.getElementById("startBtn")
.addEventListener("click",startTuner);

async function startTuner(){

    try{

        audioContext=new(
            window.AudioContext ||
            window.webkitAudioContext
        )();

        const stream=
            await navigator.mediaDevices.getUserMedia({
                audio:true
            });

        const source=
            audioContext.createMediaStreamSource(
                stream
            );

        analyser=
            audioContext.createAnalyser();

        analyser.fftSize=8192;

        source.connect(analyser);

        detectPitch();

    }catch(err){

        alert(
            "Microphone access failed:\n\n"+
            err.message
        );

        console.error(err);
    }
}

function detectPitch(){

    const buffer=
        new Float32Array(
            analyser.fftSize
        );

    analyser.getFloatTimeDomainData(
        buffer
    );

    const pitch=
        yin(
            buffer,
            audioContext.sampleRate
        );

    if(pitch>0){
        updateUI(pitch);
    }

    requestAnimationFrame(
        detectPitch
    );
}

function updateUI(freq){

    pitchHistory.push(freq);

    if(pitchHistory.length>15){
        pitchHistory.shift();
    }

    const avgFreq=
        pitchHistory.reduce(
            (a,b)=>a+b,0
        )/pitchHistory.length;

    const note=
        69+
        12*Math.log2(
            avgFreq/440
        );

    const rounded=
        Math.round(note);

    const noteName=
        noteNames[
            ((rounded%12)+12)%12
        ];

    const targetFreq=
        440*Math.pow(
            2,
            (rounded-69)/12
        );

    const cents=
        1200*Math.log2(
            avgFreq/targetFreq
        );

    document
        .getElementById("note")
        .textContent=noteName;

    const status=
        document.getElementById(
            "status"
        );

    if(Math.abs(cents)<=3){

        status.textContent=
            "✓ IN TUNE";

        status.className=
            "in-tune";

    }else if(cents<0){

        status.textContent=
            "◀ TOO LOW";

        status.className=
            "flat";

    }else{

        status.textContent=
            "TOO HIGH ▶";

        status.className=
            "sharp";
    }

    const needle=
        document.getElementById(
            "needle"
        );

    let pos=
        50+(cents*0.5);

    pos=Math.max(
        5,
        Math.min(95,pos)
    );

    const current=
        parseFloat(
            needle.dataset.pos || 50
        );

    const smoothed=
        current+
        ((pos-current)*0.15);

    needle.dataset.pos=
        smoothed;

    needle.style.left=
        smoothed+"%";
}

/* ===========================
   YIN PITCH DETECTOR
   =========================== */

function yin(buffer,sampleRate){

    const threshold=0.15;

    const yinLength=
        Math.floor(
            buffer.length/2
        );

    const yinBuffer=
        new Float32Array(
            yinLength
        );

    for(
        let tau=1;
        tau<yinLength;
        tau++
    ){

        let sum=0;

        for(
            let i=0;
            i<yinLength;
            i++
        ){

            const delta=
                buffer[i]-
                buffer[i+tau];

            sum+=delta*delta;
        }

        yinBuffer[tau]=sum;
    }

    yinBuffer[0]=1;

    let runningSum=0;

    for(
        let tau=1;
        tau<yinLength;
        tau++
    ){

        runningSum+=
            yinBuffer[tau];

        yinBuffer[tau]*=
            tau/runningSum;
    }

    let tauEstimate=-1;

    for(
        let tau=2;
        tau<yinLength;
        tau++
    ){

        if(
            yinBuffer[tau]<
            threshold
        ){

            while(
                tau+1<yinLength &&
                yinBuffer[tau+1]<
                yinBuffer[tau]
            ){
                tau++;
            }

            tauEstimate=tau;
            break;
        }
    }

    if(tauEstimate===-1){
        return -1;
    }

    return sampleRate/
           tauEstimate;
}

/* ===========================
   UKULELE-LIKE REFERENCE TONE
   =========================== */

function playTone(freq){

    const ctx=
        new(
            window.AudioContext ||
            window.webkitAudioContext
        )();

    const now=
        ctx.currentTime;

    const osc1=
        ctx.createOscillator();

    const osc2=
        ctx.createOscillator();

    const osc3=
        ctx.createOscillator();

    const gain=
        ctx.createGain();

    osc1.type="triangle";
    osc2.type="sine";
    osc3.type="triangle";

    osc1.frequency.value=
        freq;

    osc2.frequency.value=
        freq*2;

    osc3.frequency.value=
        freq*3;

    gain.gain.setValueAtTime(
        0.0001,
        now
    );

    gain.gain.exponentialRampToValueAtTime(
        0.35,
        now+0.01
    );

    gain.gain.exponentialRampToValueAtTime(
        0.0001,
        now+2
    );

    osc1.connect(gain);
    osc2.connect(gain);
    osc3.connect(gain);

    gain.connect(
        ctx.destination
    );

    osc1.start(now);
    osc2.start(now);
    osc3.start(now);

    osc1.stop(now+2);
    osc2.stop(now+2);
    osc3.stop(now+2);

    setTimeout(()=>{
        ctx.close();
    },2200);
}
```

</script>

</body>
</html>
